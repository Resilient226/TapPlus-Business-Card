<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>tap+ · Zak Bowles</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; width: 100%; }

  body {
    background: #0a0a0a;
    font-family: 'DM Sans', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow: hidden;
  }

  .ripple-bg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  .ripple-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid rgba(45, 212, 191, 0.2);
    animation: ripple 6s ease-out infinite;
  }

  .ripple-ring:nth-child(1) { animation-delay: 0s; }
  .ripple-ring:nth-child(2) { animation-delay: 1.5s; }
  .ripple-ring:nth-child(3) { animation-delay: 3s; }
  .ripple-ring:nth-child(4) { animation-delay: 4.5s; }

  @keyframes ripple {
    0%   { width: 40px;  height: 40px;  opacity: 0.8; }
    100% { width: 700px; height: 700px; opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 320px;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .logo {
    margin-bottom: 24px;
    display: flex;
    align-items: baseline;
    gap: 1px;
    line-height: 1;
  }

  .logo-tap {
    font-size: 46px;
    font-weight: 300;
    color: #b0b0b5;
    letter-spacing: -0.02em;
  }

  .logo-plus {
    font-size: 46px;
    font-weight: 700;
    color: #2dd4bf;
    letter-spacing: -0.02em;
  }

  .motto {
    font-size: 11px;
    font-weight: 400;
    color: #52525b;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 40px;
    text-align: center;
  }

  .line {
    width: 32px;
    height: 1px;
    background: #2dd4bf;
    opacity: 0.5;
    margin-bottom: 40px;
  }

  .name {
    font-size: 24px;
    font-weight: 600;
    color: #f5f5f7;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    text-align: center;
  }

  .role {
    font-size: 13px;
    color: #52525b;
    font-weight: 400;
    letter-spacing: 0.01em;
    margin-bottom: 36px;
    text-align: center;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #141414;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 15px 18px;
    text-decoration: none;
    color: #f5f5f7;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  .link-btn:active {
    background: #1c1c1e;
    border-color: rgba(45,212,191,0.3);
  }

  .link-btn.teal {
    background: #2dd4bf;
    border-color: #2dd4bf;
    color: #000;
  }

  .link-btn.teal:active { opacity: 0.85; }

  .link-icon {
    font-size: 17px;
    width: 22px;
    text-align: center;
    flex-shrink: 0;
  }

  .link-sub {
    font-size: 11px;
    color: #52525b;
    font-weight: 400;
    margin-top: 1px;
    display: block;
  }

  .link-btn.teal .link-sub {
    color: rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<div class="ripple-bg">
  <div class="ripple-ring"></div>
  <div class="ripple-ring"></div>
  <div class="ripple-ring"></div>
  <div class="ripple-ring"></div>
</div>

<div class="card">

  <div class="logo">
    <span class="logo-tap">Tap</span><span class="logo-plus">+</span>
  </div>

  <div class="motto">Reviews that happen in the moment</div>
  <div class="line"></div>

  <div class="name">Zak Bowles</div>
  <div class="role">Founder, tap+</div>

  <div class="links">
    <a class="link-btn" href="tel:+17062545909">
      <span class="link-icon">📞</span>
      <div>
        (706) 254-5909
        <span class="link-sub">Tap to call</span>
      </div>
    </a>
    <a class="link-btn" href="mailto:zakjbowles@gmail.com">
      <span class="link-icon">✉️</span>
      <div>
        zakjbowles@gmail.com
        <span class="link-sub">Tap to email</span>
      </div>
    </a>
    <a class="link-btn" href="https://tapplus.top" target="_blank">
      <span class="link-icon">🌐</span>
      <div>
        tapplus.top
        <span class="link-sub">Visit our website</span>
      </div>
    </a>
    <a class="link-btn teal" href="https://tapplus.link" target="_blank">
      <span class="link-icon">📲</span>
      <div>
        tapplus.link
        <span class="link-sub">Open the app</span>
      </div>
    </a>
  </div>

</div>
</body>
</html>
